services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    restart: always
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermes_orchestrator
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

volumes:
  pgdata:
